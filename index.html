<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nightland · 夜之乐园</title>
<link rel="stylesheet" href="app.css">
</head>
<body>
<div id="device">
  <div id="phone">
    <!-- status bar -->
    <div class="statusbar">
      <span class="sb-time">22:30</span>
      <span class="sb-notch"></span>
      <span class="sb-icons">●●● &nbsp;📶 &nbsp;🔋</span>
    </div>
    <!-- scrollable app viewport -->
    <div id="app"><!-- views injected by app.js --></div>
    <!-- bottom tab bar -->
    <nav id="tabbar">
      <button class="tab" data-route="home"><span class="ti">🌃</span><span>今晚去哪</span></button>
      <button class="tab" data-route="crew"><span class="ti">👯</span><span>组局</span></button>
      <button class="tab" data-route="passport"><span class="ti">🪪</span><span>护照</span></button>
      <button class="tab" data-route="me"><span class="ti">🎧</span><span>我的</span></button>
    </nav>
  </div>
  <div id="device-caption">Nightland · 夜之乐园 — 公共端 Demo · 数据来源：大众点评 / 小红书 / SmartShanghai 真实爬取 + 音乐打标引擎 v0</div>
</div>
<div id="toast"></div>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
